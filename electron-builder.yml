appId: io.iocoin.widgetwallet
productName: IOC Widget Wallet
mac:
  category: public.app-category.finance
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  icon: assets/icon.icns
  target:
    - target: dmg
      arch:
        - arm64
        - x64
win:
  icon: assets/icon.png
  target:
    - target: nsis
      arch:
        - x64
files:
  - "src/**"
  - "assets/**"
  - "package.json"
dmg:
  sign: false
  background: assets/img/dmg-background.png
  iconSize: 80
  window:
    width: 540
    height: 380
  contents:
    - x: 140
      y: 190
    - x: 400
      y: 190
      type: link
      path: /Applications
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: IOC Widget Wallet
